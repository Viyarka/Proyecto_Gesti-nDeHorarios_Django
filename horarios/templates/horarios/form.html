{% extends "horarios/base.html" %}
{% block content %}
<section class="panel">
    <h1>{{ titulo|default:"Formulario" }}</h1>
    <form method="post" class="form-card">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn primary" type="submit">Guardar</button>
        <a class="btn" href="javascript:history.back()">Volver</a>
    </form>
</section>
{% endblock %}
